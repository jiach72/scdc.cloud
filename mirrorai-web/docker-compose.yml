services:
  # 应用 - Next.js (MirrorAI SaaS)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mirrorai-web-app
    ports:
      - '3002:3002'
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mirrorai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mirrorai}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-mirrorai_secret_change_me}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://mirrorsaas.scdc.cloud}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-mirrorai_redis_pass}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # 数据库 - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: mirrorai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirrorai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mirrorai}
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mirrorai}']
      interval: 10s
      timeout: 5s
      retries: 5

  # 缓存 - Redis
  redis:
    image: redis:7-alpine
    container_name: mirrorai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mirrorai_redis_pass}
    ports:
      - '127.0.0.1:6381:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
