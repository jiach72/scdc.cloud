version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mirrorai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirrorai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mirrorai}
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mirrorai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mirrorai_redis_pass}
    ports:
      - '127.0.0.1:6381:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
